name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-FirstCall
          aws-region: ca-central-1

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "if [ ! -d /home/ubuntu/FirstCall ]; then git clone https://github.com/harish1120/FirstCall.git /home/ubuntu/FirstCall; fi",
              "cd /home/ubuntu/FirstCall && git pull origin main",
              "echo APP_ENV=${{ secrets.APP_ENV }} > /home/ubuntu/FirstCall/.env",
              "echo BASE_URL=${{ secrets.BASE_URL }} >> /home/ubuntu/FirstCall/.env",
              "echo OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} >> /home/ubuntu/FirstCall/.env",
              "echo TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }} >> /home/ubuntu/FirstCall/.env",
              "echo TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }} >> /home/ubuntu/FirstCall/.env",
              "echo TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }} >> /home/ubuntu/FirstCall/.env",
              "echo DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }} >> /home/ubuntu/FirstCall/.env",
              "echo ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }} >> /home/ubuntu/FirstCall/.env",
              "echo RDS_SECRET_ARN=${{ secrets.RDS_SECRET_ARN }} >> /home/ubuntu/FirstCall/.env",
              "echo RDS_HOST=${{ secrets.RDS_HOST }} >> /home/ubuntu/FirstCall/.env",
              "echo RDS_USER=${{ secrets.RDS_USER }} >> /home/ubuntu/FirstCall/.env",
              "echo RDS_DB=${{ secrets.RDS_DB }} >> /home/ubuntu/FirstCall/.env",
              "cd /home/ubuntu/FirstCall && docker build -t firstcall .",
              "docker stop firstcall || true",
              "docker rm firstcall || true",
              "docker run -d -p 8000:8000 --env-file /home/ubuntu/FirstCall/.env --name firstcall firstcall",
              "cp /home/ubuntu/FirstCall/index.html /var/www/html/index.html",
              "cp -r /home/ubuntu/FirstCall/static/ /var/www/html/static/",
              "chown -R www-data:www-data /var/www/html/"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'StandardErrorContent' \
            --output text
